<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <title>Start Your Project — Get a Quote | Webhatrix Technologies</title>
    <meta name="description"
        content="Ready to build something great? Tell us about your project in detail. We respond within 24 hours with a customized proposal.">
    <meta name="author" content="Webhatrix Technologies">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#04060F">
    <meta name="color-scheme" content="dark light">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="canonical" href="https://webhatrix.com/quote.html">
    <meta property="og:site_name" content="Webhatrix Technologies">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Get a Quote — Webhatrix Technologies">
    <meta property="og:description"
        content="Tell us about your project in detail. We respond within 24 hours with a tailored proposal.">
    <meta property="og:url" content="https://webhatrix.com/quote.html">
    <meta property="og:image" content="https://webhatrix.com/og-image.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@webhatrix">
    <meta name="twitter:image" content="https://webhatrix.com/og-image.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

    <div class="page-loader" id="pageLoader">
        <img src="images/Webhatrix Logo.jpg" alt="Webhatrix Logo" class="page-loader__logo">
        <div class="page-loader__text">WEBHATRIX</div>
        <div class="page-loader__bar"><span></span></div>
    </div>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <!-- Hero -->
    <section class="page-hero">
        <div class="hero-glow hero-glow--cyan"></div>
        <div class="breadcrumb"><a href="index.html">Home</a> → Start Project</div>
        <h1 class="section-title" style="font-size:clamp(2.2rem,5vw,3.2rem)"><span class="gradient-text">Let's Discuss
                Your Project</span></h1>
        <p class="section-subtitle" style="margin:1rem auto 0;text-align:center">The more details you provide, the
            better we can tailor our proposal to your exact needs.</p>
    </section>

    <!-- Quote Form Section -->
    <section class="section" style="padding-top:1rem">
        <div class="container" style="max-width: 800px;">
            <div class="quote-form-container reveal-up"
                style="background: var(--card); border: 1px solid var(--card-border); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
                <form class="contact-form" id="quoteForm" novalidate>
                    <input type="hidden" name="access_key" value="2f12c261-7b8b-47fe-a8a3-0cbd6a8e751a">
                    <input type="hidden" name="subject" value="New Project Quote Inquiry - Webhatrix">
                    <input type="hidden" name="from_name" value="Webhatrix Quote Form">
                    <!-- Optional: Redirect or response logic handled via JS -->

                    <h3 style="margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--cyan);">1. Contact
                        Information</h3>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Work Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="company">Company / Organization</label>
                            <input type="text" id="company" name="company">
                        </div>
                    </div>

                    <hr class="form-divider"
                        style="border: 0; height: 1px; background: var(--card-border); margin: 2rem 0;">
                    <h3 style="margin-bottom: 1.5rem; font-family: var(--font-heading); color: var(--violet);">2.
                        Project Details</h3>

                    <div class="form-group">
                        <label>What services do you need? (Select all that apply) *</label>
                        <div class="checkbox-grid"
                            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 0.5rem;">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="Web Development">
                                <span class="checkmark"></span> Web Development
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="Mobile Apps">
                                <span class="checkmark"></span> Mobile Apps
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="UI/UX Design">
                                <span class="checkmark"></span> UI/UX Design
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="SaaS & Cloud">
                                <span class="checkmark"></span> SaaS & Cloud
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="E-Commerce">
                                <span class="checkmark"></span> E-Commerce
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="AI & Automation">
                                <span class="checkmark"></span> AI & Automation
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="services" value="White Labelling">
                                <span class="checkmark"></span> White Labelling
                            </label>
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem; margin-top: 1.5rem;">
                        <div class="form-group">
                            <label for="budget">Estimated Budget *</label>
                            <select id="budget" name="budget" required>
                                <option value="">Select budget range</option>
                                <option>Flexible / To be discussed</option>
                                <option>Under ₹10000</option>
                                <option>₹10000 – ₹30000</option>
                                <option>₹30000 – ₹80000</option>
                                <option>₹80000+</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="timeline">Expected Timeline *</label>
                            <select id="timeline" name="timeline" required>
                                <option value="">Select ideal timeline</option>
                                <option>ASAP</option>
                                <option>1–3 months</option>
                                <option>3–6 months</option>
                                <option>6+ months</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Project Description *</label>
                        <textarea id="description" name="description" rows="6"
                            placeholder="Please describe your core objectives, target audience, and any key features you need..."
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="references">Reference Links / Competitors (Optional)</label>
                        <textarea id="references" name="references" rows="3"
                            placeholder="Share links to websites, apps, or competitors you like..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="source">How did you hear about us?</label>
                        <select id="source" name="source">
                            <option value="">Select an option...</option>
                            <option>Google Search</option>
                            <option>LinkedIn</option>
                            <option>Referral / Word of Mouth</option>
                            <option>Social Media</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit"
                        style="width: 100%; margin-top: 1rem; padding: 1rem;">
                        <span class="btn-text">Submit Project Inquiry →</span>
                        <span class="spinner"></span>
                    </button>
                </form>
                <div class="form-success" style="text-align: center; margin-top: 2rem;">✓ Inquiry received! We will be
                    reviewing it shortly.</div>
            </div>
        </div>
    </section>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
